<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CISSP StudyDeck</title>
  <style>
    :root {
      --bg-primary: #0a0e1a;
      --bg-secondary: #111827;
      --bg-card: #1a2035;
      --text-primary: #e2e8f0;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --accent-primary: #00d4ff;
      --accent-secondary: #0ea5e9;
      --accent-glow: rgba(0, 212, 255, 0.15);
      --accent-green: #22c55e;
      --accent-yellow: #eab308;
      --accent-red: #ef4444;
      --border-color: #1e293b;
      --font-sans: 'Segoe UI', system-ui, -apple-system, sans-serif;
      --font-mono: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
    }

    [data-theme="light"] {
      --bg-primary: #f1f5f9;
      --bg-secondary: #ffffff;
      --bg-card: #ffffff;
      --text-primary: #1e293b;
      --text-secondary: #475569;
      --text-muted: #94a3b8;
      --accent-primary: #0284c7;
      --accent-secondary: #0369a1;
      --accent-glow: rgba(2, 132, 199, 0.1);
      --accent-green: #16a34a;
      --accent-yellow: #ca8a04;
      --accent-red: #dc2626;
      --border-color: #e2e8f0;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 340px;
      min-height: 420px;
      font-family: var(--font-sans);
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.5;
      overflow-x: hidden;
    }

    .popup-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 1rem;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border-color);
    }

    .popup-brand {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 1rem;
      font-weight: 700;
    }

    .popup-brand-accent {
      color: var(--accent-primary);
    }

    .popup-brand-icon {
      font-size: 1.2rem;
    }

    .theme-btn {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 6px;
      padding: 0.25rem 0.45rem;
      cursor: pointer;
      font-size: 0.95rem;
      line-height: 1;
      color: var(--text-primary);
    }

    .theme-btn:hover {
      border-color: var(--accent-primary);
    }

    [data-theme="dark"] .theme-light { display: none; }
    [data-theme="dark"] .theme-dark { display: inline; }
    [data-theme="light"] .theme-dark { display: none; }
    [data-theme="light"] .theme-light { display: inline; }

    .popup-body {
      padding: 1rem;
    }

    .popup-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.6rem;
      margin-bottom: 1rem;
    }

    .popup-stat {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 0.7rem 0.6rem;
      text-align: center;
    }

    .popup-stat-num {
      display: block;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--accent-primary);
      font-family: var(--font-mono);
    }

    .popup-stat-label {
      display: block;
      font-size: 0.65rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-top: 0.15rem;
    }

    .popup-due-banner {
      background: var(--accent-glow);
      border: 1px solid rgba(0, 212, 255, 0.2);
      border-radius: 8px;
      padding: 0.65rem 0.75rem;
      margin-bottom: 1rem;
      text-align: center;
      font-size: 0.85rem;
    }

    .popup-due-banner strong {
      color: var(--accent-primary);
      font-family: var(--font-mono);
    }

    .popup-actions {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .popup-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.6rem 1rem;
      border: 1px solid transparent;
      border-radius: 6px;
      font-family: var(--font-sans);
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 150ms ease;
      text-decoration: none;
      width: 100%;
    }

    .popup-btn-primary {
      background: var(--accent-primary);
      color: var(--bg-primary);
      border-color: var(--accent-primary);
    }

    .popup-btn-primary:hover {
      background: var(--accent-secondary);
    }

    .popup-btn-secondary {
      background: transparent;
      color: var(--accent-primary);
      border-color: var(--accent-primary);
    }

    .popup-btn-secondary:hover {
      background: var(--accent-glow);
    }

    .popup-btn-ghost {
      background: transparent;
      color: var(--text-secondary);
      border-color: var(--border-color);
    }

    .popup-btn-ghost:hover {
      color: var(--text-primary);
      border-color: var(--text-muted);
    }

    .popup-divider {
      border: none;
      border-top: 1px solid var(--border-color);
      margin: 0.75rem 0;
    }

    .popup-domains {
      margin-top: 0.75rem;
    }

    .popup-domains h4 {
      font-size: 0.7rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
    }

    .popup-domain-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.25rem 0;
      font-size: 0.75rem;
    }

    .popup-domain-num {
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--accent-glow);
      color: var(--accent-primary);
      border-radius: 4px;
      font-weight: 700;
      font-size: 0.65rem;
      font-family: var(--font-mono);
      flex-shrink: 0;
    }

    .popup-domain-name {
      flex: 1;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .popup-domain-count {
      color: var(--text-muted);
      font-family: var(--font-mono);
      font-size: 0.7rem;
    }

    .popup-footer {
      padding: 0.5rem 1rem;
      border-top: 1px solid var(--border-color);
      text-align: center;
      font-size: 0.65rem;
      color: var(--text-muted);
    }

    .loading {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-muted);
    }

    .loading-spinner {
      display: inline-block;
      width: 24px;
      height: 24px;
      border: 3px solid var(--border-color);
      border-top-color: var(--accent-primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 0.5rem;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="popup-header">
    <div class="popup-brand">
      <span class="popup-brand-icon">&#x1F6E1;</span>
      <span>CISSP <span class="popup-brand-accent">StudyDeck</span></span>
    </div>
    <button class="theme-btn" id="popupThemeToggle" title="Toggle theme">
      <span class="theme-dark">&#x1F319;</span>
      <span class="theme-light">&#x2600;</span>
    </button>
  </div>

  <div class="popup-body" id="popupBody">
    <div class="loading" id="popupLoading">
      <div class="loading-spinner"></div>
      <div>Loading...</div>
    </div>
  </div>

  <div class="popup-footer">
    CISSP StudyDeck v1.0.0 &bull; Offline Flash Cards
  </div>

  <script src="js/popup.js"></script>
</body>
</html>
